name: Feature Request
description: Suggest an enhancement or new capability for Resume Analyzer.
title: "Feature Request"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Resume Analyzer.

        Please search existing issues first, submit one feature per issue, explain the problem before proposing a solution, and keep requests focused and actionable.

        Feature requests should respect the current architecture: reuse existing UI components, preserve the temporary upload pipeline, maintain authentication boundaries, follow current routing patterns, and keep changes aligned with the paper-themed design system.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      description: Please confirm before submitting.
      options:
        - label: I searched existing issues.
          required: true

  - type: input
    id: feature_summary
    attributes:
      label: Feature Summary
      description: Short summary of the requested feature.
      placeholder: "Example: Add PDF export for analysis reports"
    validations:
      required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve, who benefits, and why is it important?
      placeholder: |
        What problem are you trying to solve?
        Who benefits?
        Why is this important?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe a high-level solution or capability you would like to see.
      placeholder: "Describe the feature at a high level."
    validations:
      required: true

  - type: textarea
    id: alternative_solutions
    attributes:
      label: Alternative Solutions
      description: Optional. Share other approaches you considered.
      placeholder: "List any alternatives or tradeoffs here."
    validations:
      required: false

  - type: dropdown
    id: area_of_application
    attributes:
      label: Area of the Application
      description: Select the part of the app most closely related to the request.
      options:
        - Frontend
        - Backend
        - Authentication
        - Resume Upload
        - Resume Analysis
        - Dashboard
        - Report
        - Archive
        - Account
        - Deployment
        - Documentation
        - Developer Experience
        - Other
    validations:
      required: true

  - type: dropdown
    id: expected_benefit
    attributes:
      label: Expected Benefit
      description: What kind of improvement would this request provide?
      options:
        - User Experience
        - Performance
        - Security
        - Accessibility
        - Developer Experience
        - Maintainability
        - Reliability
        - New Functionality
        - Other
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Optional. Add screenshots, mockups, links, references, or examples that help explain the request.
      placeholder: "Add any supporting context here."
    validations:
      required: false

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation Notes
      description: Optional. Share implementation ideas if you have them.
      render: markdown
      placeholder: |
        You can include implementation notes, UI sketches, or integration ideas here.
    validations:
      required: false
